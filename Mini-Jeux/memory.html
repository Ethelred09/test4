<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini-jeux</title>
  <link rel="stylesheet" href="../main.css">
</head>
<body>

  <div class="test-topbar">
    <div class="topbar-zone topbar-left">
      <div class="logo-test" onclick="window.location.href='../index.html'">Test</div>
    </div>

    <div class="topbar-zone topbar-center">
      <nav class="test-menu">
        <div class="test-tab" onclick="window.location.href='../events.html'">Events</div>
        <div class="test-tab" onclick="window.location.href='../episode.html'">Épisodes</div>
        <div class="test-tab active-tab" onclick="window.location.href='../minijeux.html'">Mini-jeux</div>
        <div class="test-tab" onclick="window.location.href='../archives.html'">Archives</div>
        <div class="test-tab" onclick="window.location.href='../boutique.html'">Boutique</div>
        <div class="test-tab" onclick="window.location.href='../recharge.html'">Recharge</div>
      </nav>
    </div>

    <div class="topbar-zone topbar-right">
      <div class="profile-name-button" onclick="window.location.href='../profil.html'">Audrey</div>
      <div class="badge-ui" id="pa-display">PA : 0</div>
      <div class="badge-ui" id="gold-display">Or : 0</div>
    </div>
  </div>

  <div class="test-page">
    <div id="memory-start-popup" class="memory-start-popup">
      <div class="memory-start-card">
        <h1 class="memory-popup-title">Memory</h1>
        <p class="memory-popup-text">Retrouve les 5 paires avant la fin du temps imparti.</p>
        <p class="memory-popup-tries" id="games-left"></p>

        <div class="memory-popup-buttons">
          <div class="minigame-button" onclick="launchMemoryGame()">Lancer la partie</div>
          <div class="memory-back-button" onclick="window.location.href='minijeux.html'">Retour</div>
        </div>
      </div>
    </div>

    <div id="memory-game-area" class="memory-game-area hidden">
      <div class="memory-page-card">
        <div class="memory-header">
          <h1>Memory</h1>

          <div class="memory-stats">
            <p id="timer">Temps :60</p>
            <p id="score">Paires : 0 / 5</p>
          </div>
        </div>

        <div id="memory-grid"></div>
      </div>
    </div>
  </div>

<script>
let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let timer = 60;
let interval;
let gamesPlayed = 0;

function initializeCurrencies() {
  if (localStorage.getItem("test_pa") === null) {
    localStorage.setItem("test_pa", "250");
  }

  if (localStorage.getItem("test_gold") === null) {
    localStorage.setItem("test_gold", "50");
  }
}

function updateDisplays() {
  const pa = Number(localStorage.getItem("test_pa")) || 0;
  const gold = Number(localStorage.getItem("test_gold")) || 0;

  const paDisplay = document.getElementById("pa-display");
  const goldDisplay = document.getElementById("gold-display");

  if (paDisplay) paDisplay.textContent = "PA : " + pa;
  if (goldDisplay) goldDisplay.textContent = "Or : " + gold;
}

document.addEventListener("DOMContentLoaded", function () {
  initializeCurrencies(); // 🔥 essentiel
  updateDisplays();
});

function initDailyGames() {
  const today = new Data().toDateString;
  const lastdate = localStorage.getItem("memory_date");

  if (lastDate !== today) {
    localStorage.setItem("memory_date", today);
    localStorage.setItem("memory_games", "0");
  }
  
  gamesPlayed = Number(localStorage.getItem("memory_games")) || 0;
  updateGamesLeft();
}

function updateGamesLeft() {
  document.getElementById("games-left").textContent = 
    "Parties restantes : " + (3 - gamesPlayed);
}

function launchMemoryGame() {
  if (gamesPlayed >= 3) {
    alert("Tu as déjà joué à toutes tes parties pour aujourd'hui, reviens demain !");
    return;
  }

  document.getElementById("memory-start-popup").classList.add("hidden");
  document.getElementById("memory-game-area").classList.remove("hidden");

  gamesPlayed++;
  localStorage.setItem("memory_games", gamesPlayed);
  updateGamesLeft();

  matchedPairs = 0;
  timer = 60;
  flippedCards = [];

  document.getElementById("timer").textContent = "Temps : 60";
  document.getElementById("score").textContent= "Paires : 0 / 5";

  createGrid();
  startTimer();
}

function createGrid() {
  const grid = document.getElementById("memory-grid");
  grid.innerHTML = "";

  let values = ["A" , "A" , "B" , "B" , "C" , "C" , "D" , "D" , "E" , "E"]; 
  values.sort(() => 0.5 - Math.random());

  cards = values; 

  cards.forEach((value, index) => {
    const card = document.createElement("div");
    card.classList.add("card"); 
    card.dataset.value = value;
    card.dataset.index = index;

    card.onclick = () => flipCard(card);

    grid.appendChild(card); 
  });
}

function flipCard(card) {
  if (flippedCards.length === 2) return;
  if (card.classList.contains("flipped")) return;

  card.textContent = card.dataset.value; 
  card.classList.add("flipped");

  flippedCards.push(card);

  if (flippedCards.length === 2) {
    setTimeout(checkMatch, 500);
  }
}

function checkMatch() {
  const [card1, card2] = flippedCards;

  if (card1.dataset.value === card2.dataset.value) {
    matchedPairs++;
    updateScore();
  } else {
    card1.textContent = "";
    card2.textContent = "";
    card1.classList.remove("flipped");
    card2.classList.remove("flipped");
  }

  flippedCards = [];

  if (matchedPairs === 5) {
    endGame();
  }
}

function updateScore() {
  document.getElementById("score").textContent = 
    "Paires : " + matchedPairs + " / 5"; 
}

function startTimer() {
clearInterval(interval);

interval = setInterval(() => {
  timer--;
  document.getElementById("timer").textContent = "Temps : " + timer;

  if (timer <= 0) {
    endGame();
  }
}, 1000);
}

function endGame () {
  clearInterval(interval);

  let reward = 0;

  if (matchedPairs === 5) reward = 30;
  else if (matchedPairs >= 2) reward = 15;

  if (reward > 0) {
    let pa = Number(localStorage.getItem("test_pa")) || 0;
    pa += reward;
    localStorage.setItem("test_pa", pa);
  }

  updateDisplays();

  document.getElementById("memory-game-area").classList.add("hidden");
  document.getElementById("memory-start-popup").classList.remove("hidden")



  alert ("Fin ! Tu gagne " + reward + "PA");
}

document.addEventListener("DOMContentLoaded", function() {
    initializeCurrencies();
    updateDisplays();
    initDailyGames()
});
</script>
</body>
</html>
