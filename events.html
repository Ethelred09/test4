<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>

<!-- TOP BAR -->
<div class="test-topbar">
  <div class="topbar-zone topbar-left">
    <div class="logo-test" onclick="window.location.href='index.html'">Test</div>
  </div>

  <div class="topbar-zone topbar-center">
    <nav class="test-menu">
      <div class="test-tab active-tab" onclick="window.location.href='events.html'">Events</div>
      <div class="test-tab" onclick="window.location.href='episode.html'">Épisodes</div>
      <div class="test-tab" onclick="window.location.href='minijeux.html'">Mini-jeux</div>
      <div class="test-tab" onclick="window.location.href='archives.html'">Archives</div>
      <div class="test-tab" onclick="window.location.href='boutique.html'">Boutique</div>
      <div class="test-tab" onclick="window.location.href='recharge.html'">Recharge</div>
    </nav>
  </div>

  <div class="topbar-zone topbar-right">
    <div class="profile-name-button" onclick="window.location.href='profil.html'">Audrey</div>
    <div class="badge-ui" id="pa-display">PA : 0</div>
    <div class="badge-ui" id="gold-display">Or : 0</div>
  </div>
</div>

<div class="test-page">
    <section class="test-section active">
        <h1>Events</h1>
        <p>Il n'y pas d'events disponible pour le moment. Reviens bientôt.</p>
    </section>
</div>

<script>
function initializeCurrencies() {
  if (localStorage.getItem("test_pa") === null) {
    localStorage.setItem("test_pa", "250");
  }

  if (localStorage.getItem("test_gold") === null) {
    localStorage.setItem("test_gold", "50");
  }
}

function updateDisplays() {
  const pa = Number(localStorage.getItem("test_pa")) || 0;
  const gold = Number(localStorage.getItem("test_gold")) || 0;

  const paDisplay = document.getElementById("pa-display");
  const goldDisplay = document.getElementById("gold-display");

  if (paDisplay) paDisplay.textContent = "PA : " + pa;
  if (goldDisplay) goldDisplay.textContent = "Or : " + gold;
}

document.addEventListener("DOMContentLoaded", function () {
  initializeCurrencies(); // 🔥 essentiel
  updateDisplays();
});
</script>

</body>
</html>
